name: LocalMeetingTranscriber
options:
  bundleIdPrefix: com.localmeetingtranscriber
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5"
    MARKETING_VERSION: "0.1"
    CURRENT_PROJECT_VERSION: "1"
packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "1.0.0"
targets:
  LocalMeetingTranscriber:
    type: application
    platform: macOS
    sources:
      - path: Sources
    dependencies:
      - package: WhisperKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.localmeetingtranscriber.app
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        ENABLE_APP_SANDBOX: NO
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "需要麥克風以錄製測試音檔。"
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "需要語音辨識以進行本地端轉錄測試。"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        INFOPLIST_KEY_LSMinimumSystemVersion: "26.0"
        SWIFT_OBJC_BRIDGING_HEADER: Sources/Whisper-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/vendor/whisper/include
        LIBRARY_SEARCH_PATHS:
          - $(SRCROOT)/vendor/whisper/lib
        OTHER_LDFLAGS:
          - -lc++
          - -framework
          - Metal
          - -framework
          - MetalKit
          - -framework
          - Accelerate
          - -framework
          - Foundation
          - -force_load
          - $(SRCROOT)/vendor/whisper/lib/libwhisper.a
          - -force_load
          - $(SRCROOT)/vendor/whisper/lib/libggml.a
          - -force_load
          - $(SRCROOT)/vendor/whisper/lib/libggml-base.a
          - -force_load
          - $(SRCROOT)/vendor/whisper/lib/libggml-cpu.a
          - -force_load
          - $(SRCROOT)/vendor/whisper/lib/libggml-metal.a
          - -force_load
          - $(SRCROOT)/vendor/whisper/lib/libggml-blas.a
          - $(SRCROOT)/vendor/whisper/lib/libparakeet.a
